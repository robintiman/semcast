  <text x="60" y="48" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="36" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#E7EEEA">sem</tspan><tspan fill="#1FCFB2">::</tspan><tspan fill="#E7EEEA">cast</tspan>
  </text>
</svg>
